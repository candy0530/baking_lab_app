<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T³ 減法實驗室 - 烘焙紀錄</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .card { border-radius: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .record-card { border-left: 4px solid #6c757d; }
        .recipe-row input { font-size: 0.9rem; padding: 0.25rem 0.5rem; }
    </style>
</head>
<body>
<div class="container py-4 max-w-md">
    <h2 class="mb-4 text-center" style="color: #6c757d;">🧑‍🔬 T³ 減法實驗室</h2>
    
    <datalist id="ingredient-list">
        <option value="高筋麵粉"></option>
        <option value="低筋麵粉"></option>
        <option value="糖"></option>
        <option value="全蛋"></option>
        <option value="蛋黃"></option>
        <option value="蛋白"></option>
        <option value="可可粉"></option>
    </datalist>

    <datalist id="brand-list">
        <option value="安佳"></option>
        <option value="水手牌"></option>
        <option value="三溫糖"></option>
        <option value="上白糖"></option>
    </datalist>

    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title mb-3">📝 新增測試參數</h5>
            <form id="bakingForm">
                <div class="mb-3">
                    <label class="form-label text-muted small mb-1">品項名稱 (Iteration)</label>
                    <input type="text" class="form-control" id="recipe_name" placeholder="ex: V2.1 減糖香蕉磅蛋糕" required>
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted small mb-1 d-flex justify-content-between">
                        <span>配方明細 (名稱 / 百分比 / 克數 / 品牌)</span>
                    </label>
                    <div id="recipe-container">
                        <div class="row g-1 mb-2 recipe-row align-items-center">
                            <div class="col-3">
                                <input type="text" list="ingredient-list" class="form-control ing-name" placeholder="食材" required>
                            </div>
                            <div
